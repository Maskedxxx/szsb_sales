services:
  api:
    build: .
    entrypoint: ["conda", "run", "--no-capture-output", "-p", "/env", "python", "-m", "debugpy", "--listen", "0.0.0.0:5678", "--wait-for-client", "-m", "main"]
    container_name: "api-debug"
    env_file:
      - ./envs/.env.prod.docker
    volumes:
      - /opt/huggingface:/app/hf
    ports:
    - 8000:8000
    - 5678:5678
    networks:
      - snabik
    environment:
      - PYTHONBUFFERED=1

networks:
  snabik:
    driver: bridge
    external: true